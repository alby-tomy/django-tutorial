{% extends "master.html" %}

{% block title %}Dashboard{% endblock %}

{% block content %}
<div class="container">
  <div class="detail-card">
    <h2>Welcome, {{ request.user.username }}!</h2>
    <p class="field-value" style="margin-top: 0.5rem;">You are logged in.</p>
    <h1> Hello People </h1>
    <div class="detail-actions">
      <a href="{% url 'members' %}" class="btn btn-primary">View Members</a>
      <form method="post" action="{% url 'logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn btn-secondary">Logout</button>
      </form>
    </div>
  </div>
</div>
{% endblock %}
